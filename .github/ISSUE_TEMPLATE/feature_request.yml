name: Feature request
description: Suggest an improvement or new capability for the SDK
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that the SDK doesn't support (or makes harder than it should be)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the SDK to do? Sketch the API if you have one in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, or other ways this could be solved.
