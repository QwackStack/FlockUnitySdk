name: Build .NET SDK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build .NET SDK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore Runtime/FlockSDK.csproj

    - name: Build
      run: dotnet build Runtime/FlockSDK.csproj --configuration Release --no-restore

    - name: Pack
      run: dotnet pack Runtime/FlockSDK.csproj --configuration Release --no-build --output ./nupkgs

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nupkgs
        path: ./nupkgs

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Download Build Artifacts
      uses: actions/download-artifact@v4
      with:
        name: nupkgs
        path: ./nupkgs

    - name: Get Version
      id: get_version
      run: |
        VERSION=$(ls ./nupkgs/*.nupkg | sed -n 's/.*FlockSDK\.\(.*\)\.nupkg/\1/p')
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: Release v${{ steps.get_version.outputs.version }}
        tag_name: v${{ steps.get_version.outputs.version }}
        files: ./nupkgs/*.nupkg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 